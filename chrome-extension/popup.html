<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width" />
<title>ADSRECON</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>

<div class="panel">

  <!-- Header -->
  <div class="panel-header">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">ADSRECON</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="Refresh ads">&#8635;</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- Login warning -->
  <div class="login-warning" id="loginWarning" style="display:none">
    <span>&#9888;</span>
    <span>Please <a href="https://www.facebook.com/ads/library/" target="_blank">open Facebook Ad Library</a> and log in first.</span>
  </div>

  <!-- Tabs -->
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="search">Search</button>
    <button class="tab" data-tab="tracked">Tracked Pages</button>
    <button class="tab" data-tab="saved">Saved Ads</button>
  </div>

  <!-- Search Tab -->
  <div class="tab-content active" id="tab-search">
    <div class="search-section">
      <div class="input-group">
        <input type="text" id="searchInput" placeholder="Keyword, domain, page name..." />
        <button class="btn-primary" id="doSearch">&#128269;</button>
      </div>
      <div class="country-row">
        <label>Country:</label>
        <select id="countrySelect">
          <option value="US">United States</option>
          <option value="AF">Afghanistan</option>
          <option value="AL">Albania</option>
          <option value="DZ">Algeria</option>
          <option value="AO">Angola</option>
          <option value="AR">Argentina</option>
          <option value="AM">Armenia</option>
          <option value="AU">Australia</option>
          <option value="AT">Austria</option>
          <option value="AZ">Azerbaijan</option>
          <option value="BH">Bahrain</option>
          <option value="BD">Bangladesh</option>
          <option value="BY">Belarus</option>
          <option value="BE">Belgium</option>
          <option value="BJ">Benin</option>
          <option value="BT">Bhutan</option>
          <option value="BO">Bolivia</option>
          <option value="BA">Bosnia</option>
          <option value="BW">Botswana</option>
          <option value="BR">Brazil</option>
          <option value="BG">Bulgaria</option>
          <option value="KH">Cambodia</option>
          <option value="CM">Cameroon</option>
          <option value="CA">Canada</option>
          <option value="CL">Chile</option>
          <option value="CN">China</option>
          <option value="CO">Colombia</option>
          <option value="CR">Costa Rica</option>
          <option value="HR">Croatia</option>
          <option value="CU">Cuba</option>
          <option value="CY">Cyprus</option>
          <option value="CZ">Czech Republic</option>
          <option value="DK">Denmark</option>
          <option value="DO">Dominican Republic</option>
          <option value="EC">Ecuador</option>
          <option value="EG">Egypt</option>
          <option value="SV">El Salvador</option>
          <option value="EE">Estonia</option>
          <option value="ET">Ethiopia</option>
          <option value="FI">Finland</option>
          <option value="FR">France</option>
          <option value="GE">Georgia</option>
          <option value="DE">Germany</option>
          <option value="GH">Ghana</option>
          <option value="GR">Greece</option>
          <option value="GT">Guatemala</option>
          <option value="HN">Honduras</option>
          <option value="HK">Hong Kong</option>
          <option value="HU">Hungary</option>
          <option value="IS">Iceland</option>
          <option value="IN">India</option>
          <option value="ID">Indonesia</option>
          <option value="IR">Iran</option>
          <option value="IQ">Iraq</option>
          <option value="IE">Ireland</option>
          <option value="IL">Israel</option>
          <option value="IT">Italy</option>
          <option value="JM">Jamaica</option>
          <option value="JP">Japan</option>
          <option value="JO">Jordan</option>
          <option value="KZ">Kazakhstan</option>
          <option value="KE">Kenya</option>
          <option value="KR">South Korea</option>
          <option value="KW">Kuwait</option>
          <option value="LV">Latvia</option>
          <option value="LB">Lebanon</option>
          <option value="LY">Libya</option>
          <option value="LT">Lithuania</option>
          <option value="LU">Luxembourg</option>
          <option value="MY">Malaysia</option>
          <option value="MV">Maldives</option>
          <option value="ML">Mali</option>
          <option value="MT">Malta</option>
          <option value="MX">Mexico</option>
          <option value="MD">Moldova</option>
          <option value="MN">Mongolia</option>
          <option value="ME">Montenegro</option>
          <option value="MA">Morocco</option>
          <option value="MZ">Mozambique</option>
          <option value="MM">Myanmar</option>
          <option value="NP">Nepal</option>
          <option value="NL">Netherlands</option>
          <option value="NZ">New Zealand</option>
          <option value="NG">Nigeria</option>
          <option value="NO">Norway</option>
          <option value="PK">Pakistan</option>
          <option value="PA">Panama</option>
          <option value="PY">Paraguay</option>
          <option value="PE">Peru</option>
          <option value="PH">Philippines</option>
          <option value="PL">Poland</option>
          <option value="PT">Portugal</option>
          <option value="QA">Qatar</option>
          <option value="RO">Romania</option>
          <option value="RU">Russia</option>
          <option value="SA">Saudi Arabia</option>
          <option value="SN">Senegal</option>
          <option value="RS">Serbia</option>
          <option value="SG">Singapore</option>
          <option value="SK">Slovakia</option>
          <option value="SI">Slovenia</option>
          <option value="ZA">South Africa</option>
          <option value="ES">Spain</option>
          <option value="LK">Sri Lanka</option>
          <option value="SD">Sudan</option>
          <option value="SE">Sweden</option>
          <option value="CH">Switzerland</option>
          <option value="TW">Taiwan</option>
          <option value="TZ">Tanzania</option>
          <option value="TH">Thailand</option>
          <option value="TN">Tunisia</option>
          <option value="TR">Turkey</option>
          <option value="UG">Uganda</option>
          <option value="UA">Ukraine</option>
          <option value="AE">UAE</option>
          <option value="GB">United Kingdom</option>
          <option value="UY">Uruguay</option>
          <option value="UZ">Uzbekistan</option>
          <option value="VE">Venezuela</option>
          <option value="VN">Vietnam</option>
          <option value="YE">Yemen</option>
          <option value="ZM">Zambia</option>
          <option value="ZW">Zimbabwe</option>
        </select>
      </div>
      <div class="ad-type-row">
        <label>Ad Type:</label>
        <select id="adTypeSelect">
          <option value="all" selected>All Ads</option>
          <option value="political_and_issue_ads">Political / Issue Ads</option>
        </select>
      </div>
      <div class="ad-type-row">
        <label>Filter by:</label>
        <select id="searchTypeSelect">
          <option value="keyword">Keyword only</option>
          <option value="domain">Keyword + TLD/Domain</option>
          <option value="alltld">Keyword + All TLD Ads</option>
          <option value="tldonly">Country + TLD Only</option>
        </select>
      </div>
      <div class="input-group" id="landingPageGroup" style="display:none">
        <input type="text" id="landingPageInput" placeholder="e.g. xyz, top, click, .icu (TLD or domain)" />
        <button class="btn-primary" id="doLandingSearch">&#128269;</button>
      </div>
    </div>

    <div class="filters-section">
      <div class="filter-header">
        <span class="filter-title">Nutra Category</span>
        <button class="clear-btn" id="clearCatFilter">Clear</button>
      </div>
      <div class="category-chips" id="categoryChips">
        <button class="chip" data-cat="weight_loss">Weight Loss</button>
        <button class="chip" data-cat="blood_sugar">Blood Sugar</button>
        <button class="chip" data-cat="prostate">Prostate</button>
        <button class="chip" data-cat="skin_beauty">Skin & Beauty</button>
        <button class="chip" data-cat="joint_pain">Joint Pain</button>
        <button class="chip" data-cat="energy_stamina">Energy</button>
        <button class="chip" data-cat="gut_digestion">Gut Health</button>
        <button class="chip" data-cat="male_enhancement">Male Enhancement</button>
        <button class="chip" data-cat="anti_aging">Anti-Aging</button>
        <button class="chip" data-cat="heart_blood">Heart Health</button>
      </div>
      <div class="filter-header" style="margin-top:8px">
        <span class="filter-title">Score</span>
      </div>
      <div class="score-row">
        <span>Aggression:</span>
        <input type="range" id="scoreRange" min="0" max="100" value="0" />
        <span id="scoreVal">0</span>
      </div>
      <div class="score-row">
        <label class="checkbox-label">
          <input type="checkbox" id="nutraOnly" />
          <span>Real Nutra only</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="savedOnly" />
          <span>Saved only</span>
        </label>
      </div>

      <!-- Date Range Filter -->
      <div class="filter-header" style="margin-top:8px">
        <span class="filter-title">Date Range</span>
        <button class="clear-btn" id="clearDateBtn">Clear</button>
      </div>
      <div class="date-presets" id="datePresets">
        <button class="date-preset active" data-preset="all">All</button>
        <button class="date-preset" data-preset="7">7d</button>
        <button class="date-preset" data-preset="14">14d</button>
        <button class="date-preset" data-preset="30">30d</button>
        <button class="date-preset" data-preset="custom">Custom</button>
      </div>
      <div class="date-custom-row" id="dateCustomRow" style="display:none">
        <input type="date" id="dateFrom" class="date-input" />
        <span class="date-sep">to</span>
        <input type="date" id="dateTo" class="date-input" />
      </div>

      <!-- Ad Format Filter -->
      <div class="filter-header" style="margin-top:8px">
        <span class="filter-title">Ad Format</span>
      </div>
      <div class="format-row">
        <select id="formatSelect">
          <option value="all">All Formats</option>
          <option value="image">Image</option>
          <option value="video">Video</option>
          <option value="carousel">Carousel</option>
        </select>
        <label class="checkbox-label">
          <input type="checkbox" id="activeOnly" checked />
          <span>Active only</span>
        </label>
      </div>

      <!-- CTA Button Filter -->
      <div class="filter-header" style="margin-top:8px">
        <span class="filter-title">CTA Buttons</span>
        <button class="clear-btn" id="clearCtaBtn">Clear</button>
      </div>
      <div class="dropdown-wrapper">
        <button class="dropdown-trigger" id="ctaDropdownBtn">
          <span id="ctaDropdownLabel">All CTAs</span>
          <span class="dropdown-arrow">&#9662;</span>
        </button>
        <div class="dropdown-panel" id="ctaDropdownPanel" style="display:none">
          <div class="dropdown-search-wrap">
            <input type="text" id="ctaSearchInput" placeholder="Search CTAs..." class="dropdown-search" />
          </div>
          <div class="cta-chip-list" id="ctaChipList"></div>
        </div>
      </div>

      <!-- Language Filter -->
      <div class="filter-header" style="margin-top:8px">
        <span class="filter-title">Language</span>
        <button class="clear-btn" id="clearLangBtn">Clear</button>
      </div>
      <div class="dropdown-wrapper">
        <button class="dropdown-trigger" id="langDropdownBtn">
          <span id="langDropdownLabel">All Languages</span>
          <span class="dropdown-arrow">&#9662;</span>
        </button>
        <div class="dropdown-panel" id="langDropdownPanel" style="display:none">
          <div class="dropdown-search-wrap">
            <input type="text" id="langSearchInput" placeholder="Search languages..." class="dropdown-search" />
          </div>
          <div class="cta-chip-list" id="langChipList"></div>
        </div>
      </div>

      <!-- UTM Filter -->
      <div class="filter-header" style="margin-top:8px">
        <span class="filter-title">UTM / Link Filter</span>
        <button class="clear-btn" id="clearUtmBtn">Clear</button>
      </div>
      <div class="utm-row">
        <input type="text" id="utmInput" placeholder="e.g. utm_source=Google, utm_medium=facebook" />
      </div>
    </div>

    <!-- Results -->
    <div class="results-section">
      <div class="results-header">
        <span class="results-count" id="resultsCount">0 ads</span>
        <span class="debug-info" id="debugInfo" style="display:none;font-size:9px;color:var(--accent-orange)"></span>
        <button class="btn-sm btn-secondary" id="scanBtn">&#8635; Scan</button>
        <button class="btn-sm btn-secondary" id="exportBtn">Export CSV</button>
      </div>
      <div class="results-list" id="resultsList">
        <div class="empty-state">
          <div class="empty-icon">&#128269;</div>
          <div class="empty-text">Open Facebook Ad Library and search for ads</div>
          <button class="btn-sm btn-primary" id="openLibrary">Open Ad Library</button>
        </div>
      </div>
    </div>

    <!-- Domain Filter Section -->
    <div class="domain-section" id="domainSection">
      <div class="filter-header">
        <span class="filter-title">Domain Filter</span>
        <button class="clear-btn" id="clearDomainBtn">Clear</button>
      </div>
      <div class="domain-controls">
        <label class="toggle-label">
          <input type="checkbox" id="hideClean" />
          <span class="toggle-text">Hide standard TLDs</span>
          <span class="toggle-hint" id="shadyCount">(0)</span>
        </label>
      </div>
      <div class="domain-tld-list" id="domainTldList">
        <!-- Populated dynamically -->
      </div>
    </div>
  </div>

  <!-- Tracked Pages Tab -->
  <div class="tab-content" id="tab-tracked">
    <div class="add-page-section">
      <input type="text" id="newPageInput" placeholder="Enter Facebook Page name or URL..." />
      <button class="btn-primary" id="addPageBtn">Track Page</button>
    </div>
    <div class="tracked-list" id="trackedList">
      <div class="empty-state">
        <div class="empty-icon">&#128278;</div>
        <div class="empty-text">No pages tracked yet</div>
      </div>
    </div>
  </div>

  <!-- Saved Ads Tab -->
  <div class="tab-content" id="tab-saved">
    <div class="saved-list" id="savedList">
      <div class="empty-state">
        <div class="empty-icon">&#9734;</div>
        <div class="empty-text">No saved ads yet</div>
      </div>
    </div>
    <div class="saved-actions">
      <button class="btn-sm btn-secondary" id="exportSavedBtn">Export Saved</button>
      <button class="btn-sm btn-danger" id="clearSavedBtn">Clear All</button>
    </div>
  </div>

  <!-- Ad Detail Modal -->
  <div class="modal" id="adModal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Ad Details</span>
        <button class="icon-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter">
        <button class="btn-sm btn-secondary" id="visitPageBtn">Visit Page</button>
        <button class="btn-sm btn-secondary" id="ripBtn">Rip Landing Page</button>
        <button class="btn-sm btn-primary" id="saveAdBtn">&#9734; Save</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" style="display:none"></div>

</div>

<script src="popup.js"></script>
</body>
</html>
